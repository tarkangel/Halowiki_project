version: '3.8'

services:
  # Local development with hot reload
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_HALOPEDIA_API_URL=${VITE_HALOPEDIA_API_URL:-https://www.halopedia.org/api.php}
      - VITE_APP_TITLE=${VITE_APP_TITLE:-Halo Wiki}
    command: sh -c "npm install && npm run dev -- --host"
    env_file:
      - .env.local

  # Production build preview
  preview:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - VITE_HALOPEDIA_API_URL=${VITE_HALOPEDIA_API_URL:-https://www.halopedia.org/api.php}
